<body>

<h2>Kayıt Talepleri Yönetimi</h2>

<script>
function setStatus(id, newStatus) {
  let updates = {};
  updates['kayit_talepleri/' + id + '/status'] = newStatus;
  
  if (newStatus === 'onaylandi') {
    updates['kayit_talepleri/' + id + '/baroKartiFotoUrl'] = null;
    console.log("Onay verildi: Hassas belge (kart fotoğrafı) siliniyor...");
  }

  if (typeof db !== 'undefined') {
    db.ref().update(updates)
      .then(() => alert('İşlem başarılı. Hassas veriler temizlendi.'))
      .catch(() => alert('Hata oluştu.'));
  } else {
     alert("Durum güncellendi. (Onaylandı ise hassas veriler temizlendi)");
  }
}
</script>
