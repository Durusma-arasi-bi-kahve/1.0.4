<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duruşma Arası</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0b07; color: #f2e9d0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* İLK RESİMDEKİ KOYU MODAL TASARIMI */
        .modal-bg { background-color: #1a160f; border: 1px solid #332b1d; }
        
        /* ADLİYE BUTONLARI */
        .adliye-btn { 
            background-color: #1a160f; 
            border: 1px solid #4a3f2c; 
            color: #d4a373; 
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
        }
        .adliye-btn.selected { 
            border-color: #d4a373; 
            background-color: #2a2419; 
            color: #f2e9d0; 
            box-shadow: 0 0 15px rgba(212, 163, 115, 0.2); 
        }

        /* ANA BUTON (KAHVE) */
        .coffee-glow {
            box-shadow: 0 0 30px rgba(212, 163, 115, 0.1);
            border: 1px solid rgba(212, 163, 115, 0.2);
            background: rgba(212, 163, 115, 0.05);
        }

        /* BİLDİRİM POPUP */
        #alert-popup { 
            animation: slideDown 0.5s ease-out; 
            background: linear-gradient(to right, #d4a373, #b08254); 
            color: #1a160f; 
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="font-sans antialiased">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="alert-popup" class="hidden fixed top-0 left-0 right-0 z-[100] p-4 shadow-2xl">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-xl">🔔</span>
                <p id="alert-msg" class="text-sm font-bold"></p>
            </div>
            <button onclick="closeAlert()" class="text-[10px] font-bold border border-black/20 px-2 py-1 rounded">KAPAT</button>
        </div>
    </div>

    <div id="main-screen" class="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="relative mb-8 cursor-pointer" onclick="konumlaVeBaslat()">
            <div class="w-40 h-40 rounded-full flex items-center justify-center coffee-glow hover:scale-105 transition-transform active:scale-95">
                <span class="text-6xl">☕</span>
            </div>
            <div class="absolute bottom-2 right-2 bg-[#d4a373] text-[#1a160f] text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">AKTİF</div>
        </div>
        <h2 class="text-3xl font-serif text-[#d4a373] tracking-wide">Adliyedeyim</h2>
        <p class="text-gray-500 text-sm mt-3 italic max-w-[200px]">Meslektaşınla kahveye bekleniyorsun</p>
    </div>

    <div id="selection-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="modal-bg w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            
            <h3 class="text-2xl font-serif text-[#d4a373] mb-2 text-center">Hangi adliyedesin?</h3>
            <p id="status-text" class="text-[11px] text-gray-500 mb-6 text-center leading-relaxed px-4">
                Konumunuz sorgulanıyor... Lütfen adliyeyi onaylayın.
            </p>
            
            <div id="adliye-grid" class="grid grid-cols-2 gap-3 mb-8">
                </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border border-[#332b1d] text-gray-500 font-bold text-sm active:opacity-70">İptal</button>
                <button id="confirm-btn" onclick="checkInYap()" disabled class="flex-1 py-4 rounded-2xl bg-[#d4a373] text-[#1a160f] font-bold text-sm opacity-40 transition-all shadow-lg active:scale-95">Check-in Yap ✓</button>
            </div>
        </div>
    </div>

    <script>
        const adliyeler = [
            { id: 1, ad: "Çağlayan Adliyesi", lat: 41.0692, lng: 28.9803 },
            { id: 2, ad: "İstanbul Anadolu (Kartal)", lat: 40.9133, lng: 29.1760 },
            { id: 3, ad: "Bakırköy (Ana Bina)", lat: 40.9959, lng: 28.8789 },
            { id: 4, ad: "Bakırköy Ek Bina", lat: 40.9950, lng: 28.8330 },
            { id: 5, ad: "Küçükçekmece Adliyesi", lat: 41.0006, lng: 28.8101 },
            { id: 6, ad: "GOP Adliyesi", lat: 41.0682, lng: 28.9145 },
            { id: 7, ad: "İcra Başkanlığı (Ek Bina)", lat: 41.0682, lng: 28.9887 }
        ];

        let selectedId = null;

        function renderGrid(autoId = null) {
            const grid = document.getElementById('adliye-grid');
            grid.innerHTML = '';
            
            adliyeler.forEach((a, index) => {
                const isSelected = a.id === autoId;
                const isLast = index === 6; 
                const gridClass = isLast ? 'col-span-2' : 'col-span-1';

                grid.innerHTML += `
                    <button onclick="selectAdliye(${a.id})" id="btn-${a.id}" 
                        class="adliye-btn ${gridClass} p-3 rounded-2xl text-[11px] font-bold h-14 ${isSelected ? 'selected' : ''}">
                        ${a.ad}
                    </button>
                `;
            });
            if(autoId) selectAdliye(autoId);
        }

        function selectAdliye(id) {
            selectedId = id;
            document.querySelectorAll('.adliye-btn').forEach(b => b.classList.remove('selected'));
            const target = document.getElementById(`btn-${id}`);
            if(target) target.classList.add('selected');
            
            const btn = document.getElementById('confirm-btn');
            btn.disabled = false;
            btn.classList.remove('opacity-40');
        }

        function konumlaVeBaslat() {
            // Modalı hemen göster (tıklama tepkisini hissetmek için)
            document.getElementById('selection-modal').classList.remove('hidden');
            renderGrid();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let enYakin = null; let minD = Infinity;
                    adliyeler.forEach(a => {
                        let d = mesafe(pos.coords.latitude, pos.coords.longitude, a.lat, a.lng);
                        if(d < minD) { minD = d; enYakin = a; }
                    });
                    if(minD <= 2.0) {
                        document.getElementById('status-text').innerText = "📍 " + enYakin.ad + " konumundasınız.";
                        renderGrid(enYakin.id);
                    } else {
                        document.getElementById('status-text').innerText = "Yakınlarda adliye bulunamadı, lütfen seçin.";
                    }
                }, () => {
                    document.getElementById('status-text').innerText = "Konum izni alınamadı. Lütfen manuel seçin.";
                }, {timeout: 5000});
            }
        }

        function checkInYap() {
            const ad = adliyeler.find(x => x.id === selectedId).ad;
            closeModal();
            
            // Arkadaş uyarısı simülasyonu
            setTimeout(() => {
                const sound = document.getElementById('notif-sound');
                sound.play().catch(() => console.log("Ses çalma için kullanıcı etkileşimi gerekiyor."));
                
                document.getElementById('alert-msg').innerText = `Av. Selin şu an ${ad} konumuna geldi!`;
                document.getElementById('alert-popup').classList.remove('hidden');
                
                // 5 saniye sonra kapat
                setTimeout(closeAlert, 5000);
            }, 1000);
        }

        function mesafe(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function closeModal() { document.getElementById('selection-modal').classList.add('hidden'); }
        function closeAlert() { document.getElementById('alert-popup').classList.add('hidden'); }
    </script>
</body>
</html>
