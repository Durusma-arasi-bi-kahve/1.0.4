<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duruşma Arası">
<meta name="theme-color" content="#0F0A04">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230F0A04'/%3E%3Ctext x='90' y='115' font-size='80' text-anchor='middle'%3E%E2%98%95%3C/text%3E%3C/svg%3E">
<title>Duruşma Arası</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0F0A04;
  --bg2: #1A140D;
  --bg3: #261F16;
  --gold: #D4AF37;
  --text: #F2EBE1;
  --muted: #A39B8F;
  --muted2: #7A7266;
  --border: #332B21;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
  background-color: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

.serif { font-family: 'Playfair Display', serif; }

.page {
  display: none;
  min-height: 100vh;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  flex-direction: column;
}
.page.active { display: flex; }

.header {
  padding: 16px;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg2);
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-logo { font-size: 24px; font-weight: 600; color: var(--gold); }

/* Form Styles */
.form-container {
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 400px;
  margin: 0 auto;
  width: 100%;
}
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group label { font-size: 14px; color: var(--muted); }
.input-group input {
  background: var(--bg3);
  border: 0.5px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
}
.input-group input:focus { border-color: var(--gold); }

.btn {
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.btn:active { opacity: 0.8; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--bg2);
  border-bottom: 0.5px solid var(--border);
}
.tab {
  flex: 1;
  padding: 16px 0;
  text-align: center;
  color: var(--muted);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

.tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px; }
.tab-content.active { display: block; }

/* User List Item (Buradakiler) */
.user-card {
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.user-info { display: flex; flex-direction: column; gap: 4px; }
.user-name { font-size: 16px; font-weight: 600; color: var(--text); }
.user-status { font-size: 12px; color: #4CAF50; }

.user-actions { display: flex; gap: 8px; }
.action-btn {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  color: var(--gold);
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
}
.action-btn.chat { background: var(--gold); color: var(--bg); border: none; }
.action-btn:active { opacity: 0.8; }

/* Chat Modal */
#chat-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  z-index: 100;
  display: none;
  flex-direction: column;
}
.chat-header {
  display: flex;
  align-items: center;
  padding: 16px;
  padding-top: calc(16px + env(safe-area-inset-top));
  background: var(--bg2);
  border-bottom: 0.5px solid var(--border);
}
.back-btn {
  background: none; border: none; color: var(--gold); font-size: 24px;
  margin-right: 16px; cursor: pointer;
}
.chat-header-info { display: flex; flex-direction: column; }
.chat-messages {
  flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
}
.chat-input-area {
  padding: 12px 16px;
  border-top: 0.5px solid var(--border);
  display: flex;
  gap: 10px;
  background: var(--bg2);
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}
.chat-input-area input {
  flex: 1; background: var(--bg3); border: 0.5px solid var(--border);
  border-radius: 20px; padding: 10px 16px; color: var(--text); outline: none;
}
.icon-btn {
  background: var(--gold); color: var(--bg); border: none;
  width: 42px; height: 42px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
}
</style>
</head>
<body>

<div id="page-login" class="page active">
  <div class="header">
    <div class="header-logo serif">Duruşma Arası</div>
  </div>
  <div class="form-container">
    <div class="input-group">
      <label>Ad Soyad</label>
      <input type="text" id="inp-name" placeholder="Av. İsim Soyisim">
    </div>
    <div class="input-group">
      <label>Baro Sicil No</label>
      <input type="text" id="inp-sicil" placeholder="Örn: 12345">
    </div>
    <div class="input-group">
      <label>Telefon Numarası</label>
      <input type="tel" id="inp-tel" placeholder="05XX XXX XX XX">
    </div>
    <button class="btn" onclick="handleLogin()">Giriş Yap</button>
  </div>
</div>

<div id="page-main" class="page">
  <div class="header">
    <div class="header-logo serif">Duruşma Arası</div>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('buradakiler')">Buradakiler</div>
    <div class="tab" onclick="switchTab('sohbetler')">Sohbetler</div>
    <div class="tab" onclick="switchTab('arkadaslar')">Arkadaşlar</div>
  </div>

  <div id="tab-buradakiler" class="tab-content active">
    <div id="online-users-list">
      </div>
  </div>

  <div id="tab-sohbetler" class="tab-content">
    <div style="text-align:center; color:var(--muted2); margin-top:20px;">Henüz sohbetiniz yok.</div>
  </div>

  <div id="tab-arkadaslar" class="tab-content">
    <div id="friend-requests-list"></div>
    <div style="text-align:center; color:var(--muted2); margin-top:20px;">Arkadaş listeniz.</div>
  </div>
</div>

<div id="chat-modal">
  <div class="chat-header">
    <button class="back-btn" onclick="closeChat()">‹</button>
    <div class="chat-header-info">
      <div class="header-logo serif" id="chat-user-name" style="font-size:18px;">Av. Meslektaş</div>
      <div class="user-status" id="chat-user-status">Çevrimiçi</div>
    </div>
  </div>
  <div id="chat-messages" class="chat-messages">
    <div style="align-self:center; background:var(--bg3); padding:6px 12px; border-radius:12px; font-size:11px; color:var(--muted2);">Sohbet Başlatıldı</div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Mesajınızı yazın..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="icon-btn" onclick="sendMessage()">➔</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ─── FIREBASE CONFIG BURAYA GELECEK ───
/*
const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "PROJECT.firebaseapp.com",
  databaseURL: "https://PROJECT.firebaseio.com",
  projectId: "PROJECT",
  storageBucket: "PROJECT.appspot.com",
  messagingSenderId: "ID",
  appId: "APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
*/

// ─── PULL-TO-REFRESH ENGELLEYİCİ ───
(function(){
  let startY=0;
  document.addEventListener('touchstart',e=>{startY=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchmove',e=>{
    const el=e.target.closest('.page,#chat-messages,#friend-requests-list');
    if(!el){if(window.scrollY===0)e.preventDefault();return}
    if(el.scrollTop===0&&e.touches[0].clientY>startY)e.preventDefault()
  },{passive:false})
})();

// ─── STORAGE YARDIMCILARI ───
function getFromStorage(key) { return localStorage.getItem(key); }
function setToStorage(key, val) { localStorage.setItem(key, val); }
function removeFromStorage(key) { localStorage.removeItem(key); }

let currentUser = {};
let activeChatUserId = null;

// ─── SAYFA YÜKLENİNCE ───
window.onload = function() {
  const savedName = getFromStorage('durusma_name');
  const savedSicil = getFromStorage('durusma_sicil');
  const savedTel = getFromStorage('durusma_tel');
  const loggedIn = getFromStorage('durusma_loggedin');

  if(savedSicil) document.getElementById('inp-sicil').value = savedSicil;
  if(savedTel) document.getElementById('inp-tel').value = savedTel;
  if(savedName) document.getElementById('inp-name').value = savedName;

  if(loggedIn === '1' && savedName && savedSicil) {
    applyLogin(savedName, savedSicil, savedTel || '');
  }
};

function handleLogin() {
  const name = document.getElementById('inp-name').value.trim();
  const sicil = document.getElementById('inp-sicil').value.trim();
  const tel = document.getElementById('inp-tel').value.trim();

  if(!name || !sicil) {
    alert('Lütfen Ad Soyad ve Sicil No alanlarını doldurun.');
    return;
  }

  applyLogin(name, sicil, tel);
}

function applyLogin(name, sicil, tel) {
  currentUser = { name, sicil, tel };
  
  setToStorage('durusma_name', name);
  setToStorage('durusma_sicil', sicil);
  setToStorage('durusma_tel', tel);
  setToStorage('durusma_loggedin', '1');

  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-main').classList.add('active');

  setOnlineStatus();
  listenOnlineUsers();
}

// ─── TAB GEÇİŞLERİ ───
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
  
  event.currentTarget.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

// ─── ÇEVRİMİÇİ (BURADAKİLER) MANTIĞI VE ARKADAŞ EKLEME ───
function setOnlineStatus() {
  /* Firebase Bağlantısı Varsa:
  const userRef = db.ref('online_users/' + currentUser.sicil);
  userRef.set({
    name: currentUser.name,
    sicil: currentUser.sicil,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
  userRef.onDisconnect().remove();
  */
}

function listenOnlineUsers() {
  /* Firebase Bağlantısı Varsa:
  db.ref('online_users').on('value', snap => {
    const users = [];
    snap.forEach(child => {
      users.push(child.val());
    });
    renderOnlineUsers(users);
  });
  */
  
  // Arayüzü görebilmeniz için Demo Veri:
  const fakeUsers = [
    { name: 'Av. Ali Yılmaz', sicil: '54321' },
    { name: 'Av. Ayşe Demir', sicil: '98765' }
  ];
  renderOnlineUsers(fakeUsers);
}

function renderOnlineUsers(users) {
  const container = document.getElementById('online-users-list');
  container.innerHTML = '';

  let hasUsers = false;

  users.forEach(user => {
    if(user.sicil === currentUser.sicil) return; // Kendini listede gösterme
    
    hasUsers = true;
    const div = document.createElement('div');
    div.className = 'user-card';
    div.innerHTML = `
      <div class="user-info">
        <div class="user-name">${user.name}</div>
        <div class="user-status">● Çevrimiçi</div>
      </div>
      <div class="user-actions">
        <button class="action-btn" onclick="sendFriendRequest('${user.sicil}', '${user.name}')">Ekle</button>
        <button class="action-btn chat" onclick="openChat('${user.sicil}', '${user.name}')">Mesaj</button>
      </div>
    `;
    container.appendChild(div);
  });

  if(!hasUsers) {
    container.innerHTML = '<div style="text-align:center; color:var(--muted2); margin-top:20px;">Şu an başka kimse yok.</div>';
  }
}

// Arkadaş Ekleme İşlevi
function sendFriendRequest(targetSicil, targetName) {
  /* Firebase Bağlantısı Varsa:
  db.ref('friend_requests/' + targetSicil + '/' + currentUser.sicil).set({
    fromName: currentUser.name,
    fromSicil: currentUser.sicil,
    status: 'pending',
    timestamp: firebase.database.ServerValue.TIMESTAMP
  }).then(() => {
    alert(targetName + ' kullanıcısına arkadaşlık isteği gönderildi.');
  });
  */
  alert(targetName + ' kullanıcısına arkadaşlık isteği gönderildi!');
}

// ─── SOHBET (MESAJ) MANTIĞI ───
function openChat(targetSicil, targetName) {
  activeChatUserId = targetSicil;
  document.getElementById('chat-user-name').innerText = targetName;
  document.getElementById('chat-modal').style.display = 'flex';
  
  const msgContainer = document.getElementById('chat-messages');
  msgContainer.innerHTML = '<div style="align-self:center; background:var(--bg3); padding:6px 12px; border-radius:12px; font-size:11px; color:var(--muted2);">Sohbet Başlatıldı</div>';
}

function closeChat() {
  document.getElementById('chat-modal').style.display = 'none';
  activeChatUserId = null;
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text || !activeChatUserId) return;

  const msgContainer = document.getElementById('chat-messages');
  
  // Kendi mesajımızı ekrana ekliyoruz
  const msgDiv = document.createElement('div');
  msgDiv.style.alignSelf = 'flex-end';
  msgDiv.style.background = 'var(--gold)';
  msgDiv.style.color = 'var(--bg)';
  msgDiv.style.padding = '10px 14px';
  msgDiv.style.borderRadius = '16px 16px 0 16px';
  msgDiv.style.maxWidth = '75%';
  msgDiv.innerText = text;
  
  msgContainer.appendChild(msgDiv);
  msgContainer.scrollTop = msgContainer.scrollHeight;

  input.value = '';

  /* Firebase Bağlantısı Varsa:
  const chatId = currentUser.sicil < activeChatUserId 
    ? currentUser.sicil + "_" + activeChatUserId 
    : activeChatUserId + "_" + currentUser.sicil;
    
  db.ref('chats/' + chatId).push({
    sender: currentUser.sicil,
    text: text,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
  */
}
</script>
</body>
</html>
