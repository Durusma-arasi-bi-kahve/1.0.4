<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duruşma Arası Bi Kahve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0b07; color: #f2e9d0; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none; }
        .modal-bg { background-color: #1a160f; border: 1px solid #332b1d; }
        .adliye-btn { background-color: #1a160f; border: 1px solid #4a3f2c; color: #d4a373; transition: all 0.3s; }
        .adliye-btn.selected { border-color: #d4a373; background-color: #2a2419; color: #f2e9d0; box-shadow: 0 0 15px rgba(212, 163, 115, 0.2); }
        .checkin-btn { background-color: #d4a373; color: #1a160f; font-weight: 700; }
        .checkin-btn:disabled { background-color: #4a3f2c; color: #888; cursor: not-allowed; }
        
        /* Bildirim Barı Tasarımı */
        #alert-popup { animation: slideDown 0.5s ease-out; background: linear-gradient(to right, #d4a373, #b08254); color: #1a160f; }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="font-sans antialiased">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div id="alert-popup" class="hidden fixed top-0 left-0 right-0 z-[100] p-4 shadow-2xl">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🔔</span>
                <p id="alert-msg" class="text-sm font-bold"></p>
            </div>
            <button onclick="closeAlert()" class="text-xs border border-black/20 px-2 py-1 rounded">Kapat</button>
        </div>
    </div>

    <div id="main-screen" class="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-6">
        <div class="relative mb-8">
            <button onclick="konumlaVeBaslat()" class="w-32 h-32 rounded-full bg-[#d4a373]/10 border border-[#d4a373]/30 flex items-center justify-center shadow-[0_0_50px_rgba(212,163,115,0.1)] hover:scale-105 transition-transform">
                <span class="text-5xl">☕</span>
            </button>
            <div class="absolute -bottom-2 -right-2 bg-[#d4a373] text-[#1a160f] text-[10px] font-bold px-2 py-1 rounded-full">AKTİF</div>
        </div>
        <h2 class="text-2xl font-serif text-[#d4a373]">Adliyedeyim</h2>
        <p class="text-gray-500 text-sm mt-2 italic">Meslektaşınla kahveye bekleniyorsun</p>
    </div>

    <div id="selection-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="modal-bg w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            
            <h3 class="text-2xl font-serif text-[#d4a373] mb-2 text-center">Hangi adliyedesin?</h3>
            <p id="status-text" class="text-xs text-gray-500 mb-6 text-center leading-relaxed">
                GPS konumunuz adliyeye yakın. Doğru adliyeyi seçin ya da listeden bulun.
            </p>
            
            <div id="adliye-grid" class="grid grid-cols-2 gap-3 mb-8">
                </div>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl border border-[#332b1d] text-gray-500 font-medium active:scale-95 transition">İptal</button>
                <button id="confirm-btn" onclick="checkInYap()" disabled class="checkin-btn flex-1 py-4 rounded-2xl active:scale-95 transition shadow-lg">Check-in Yap ✓</button>
            </div>
        </div>
    </div>

    <script>
        const adliyeler = [
            { id: 1, ad: "Çağlayan Adliyesi", lat: 41.06927, lng: 28.98036 },
            { id: 2, ad: "İstanbul Anadolu (Kartal)", lat: 40.91332, lng: 29.17601 },
            { id: 3, ad: "Bakırköy (Ana Bina)", lat: 40.99596, lng: 28.87891 },
            { id: 4, ad: "Bakırköy Ek Bina", lat: 40.99500, lng: 28.83305 },
            { id: 5, ad: "Küçükçekmece Adliyesi", lat: 41.00064, lng: 28.81013 },
            { id: 6, ad: "GOP Adliyesi", lat: 41.06821, lng: 28.91456 },
            { id: 7, ad: "İcra Başkanlığı (Ek Bina)", lat: 41.06826, lng: 28.98878 }
        ];

        let selectedId = null;

        function renderGrid(autoId = null) {
            const grid = document.getElementById('adliye-grid');
            grid.innerHTML = '';
            
            adliyeler.forEach((a, index) => {
                const isSelected = a.id === autoId;
                const isLast = index === 6; // 7. adliye tam genişlik
                const gridClass = isLast ? 'col-span-2' : 'col-span-1';

                grid.innerHTML += `
                    <button onclick="selectAdliye(${a.id})" id="btn-${a.id}" 
                        class="adliye-btn ${gridClass} p-3 rounded-2xl text-[11px] font-bold h-16 flex items-center justify-center text-center ${isSelected ? 'selected' : ''}">
                        ${a.ad}
                    </button>
                `;
            });
            if(autoId) selectAdliye(autoId);
        }

        function selectAdliye(id) {
            selectedId = id;
            document.querySelectorAll('.adliye-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById(`btn-${id}`).classList.add('selected');
            document.getElementById('confirm-btn').disabled = false;
        }

        function mesafe(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function konumlaVeBaslat() {
            document.getElementById('selection-modal').classList.remove('hidden');
            renderGrid();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let enYakin = null; let minD = Infinity;
                    adliyeler.forEach(a => {
                        let d = mesafe(pos.coords.latitude, pos.coords.longitude, a.lat, a.lng);
                        if(d < minD) { minD = d; enYakin = a; }
                    });
                    if(minD <= 2.0) {
                        document.getElementById('status-text').innerText = "✨ " + enYakin.ad + " yakınında tespit edildiniz.";
                        renderGrid(enYakin.id);
                    }
                }, null, {enableHighAccuracy: true});
            }
        }

        function checkInYap() {
            const ad = adliyeler.find(x => x.id === selectedId).ad;

            // Simülasyon: Check-in sonrası arkadaş bildirimi
            setTimeout(() => {
                document
