<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duruşma Arası Bi Kahve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        body { -webkit-tap-highlight-color: transparent; }
        /* Kaydırma çubuğunu daha zarif hale getirelim */
        #adliye-list::-webkit-scrollbar { width: 5px; }
        #adliye-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="main-screen" class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-20">
        <header class="p-4 flex justify-between items-center border-b">
            <h1 class="text-xl font-bold text-blue-600">Duruşma Arası</h1>
            <div class="flex items-center gap-2">
                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">Av. Meslektaş</span>
            </div>
        </header>

        <main class="p-6 text-center">
            <div class="bg-blue-50 p-8 rounded-3xl mb-6">
                <button onclick="konumlaVeBaslat()" class="bg-blue-600 text-white w-24 h-24 rounded-full text-4xl shadow-xl hover:scale-105 transition-transform mb-4">☕</button>
                <h2 class="text-xl font-bold">Adliyedeyim</h2>
                <p class="text-gray-600 text-sm">Kahveye Beklerim</p>
            </div>

            <div class="mt-8 text-left">
                <h3 class="font-bold mb-4 text-gray-700">Aynı adliyedekiler</h3>
                <div id="no-lawyer-msg" class="text-center py-10 text-gray-400 border-2 border-dashed border-gray-100 rounded-xl">
                    📍 Şu an bu adliyede kimse görünmüyor.
                </div>
            </div>
        </main>
    </div>

    <div id="selection-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-50">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-3xl p-6 shadow-2xl transition-all">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 sm:hidden"></div>
            
            <h3 class="text-xl font-bold mb-1">Hangi adliyedesin?</h3>
            <p id="status-text" class="text-sm text-gray-500 mb-6 font-medium">Konumunuz sorgulanıyor...</p>
            
            <ul id="adliye-list" class="space-y-3 max-h-[400px] overflow-y-auto mb-6 pr-2">
                </ul>

            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold active:scale-95 transition">İptal</button>
                <button id="confirm-btn" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold opacity-50 cursor-not-allowed active:scale-95 transition" disabled>Check-in Yap ✓</button>
            </div>
        </div>
    </div>

    <script>
        const adliyeler = [
            { id: 1, ad: "Çağlayan Adliyesi", lat: 41.06927899893783, lng: 28.98036156972052 },
            { id: 2, ad: "İstanbul Anadolu Adliyesi (Kartal)", lat: 40.91332562944301, lng: 29.176010493362906 },
            { id: 3, ad: "Bakırköy Adliyesi (Ana Bina)", lat: 40.99596382224838, lng: 28.878911642752712 },
            { id: 4, ad: "Bakırköy Adliyesi Ek Bina", lat: 40.9950038841365, lng: 28.833059949320866 },
            { id: 5, ad: "Küçükçekmece Adliyesi", lat: 41.00064778158206, lng: 28.810135666393002 },
            { id: 6, ad: "GOP Adliyesi", lat: 41.068212, lng: 28.914567 },
            { id: 7, ad: "İstanbul Adliyesi Ek Hizmet Binası (İcra Başkanlığı)", lat: 41.068264347803186, lng: 28.98878795439217 }
        ];

        let selectedAdliyeId = null;

        function renderList(autoSelectedId = null) {
            const listEl = document.getElementById('adliye-list');
            listEl.innerHTML = '';
            adliyeler.forEach(a => {
                const isSelected = a.id === autoSelectedId;
                listEl.innerHTML += `
                    <li onclick="selectAdliye(${a.id})" id="adliye-${a.id}" 
                        class="p-4 border-2 rounded-2xl cursor-pointer flex justify-between items-center transition-all ${isSelected ? 'border-blue-600 bg-blue-50 ring-2 ring-blue-100' : 'border-gray-100'}">
                        <span class="font-semibold text-gray-700">${a.ad}</span>
                        ${isSelected ? '<span class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded-lg animate-pulse">YAKINDA</span>' : ''}
                    </li>
                `;
            });
            if(autoSelectedId) selectAdliye(autoSelectedId);
        }

        function selectAdliye(id) {
            selectedAdliyeId = id;
            document.querySelectorAll('#adliye-list li').forEach(el => {
                el.classList.remove('border-blue-600', 'bg-blue-50', 'ring-2', 'ring-blue-100');
            });
            const selectedItem = document.getElementById(`adliye-${id}`);
            if (selectedItem) {
                selectedItem.classList.add('border-blue-600', 'bg-blue-50', 'ring-2', 'ring-blue-100');
                // Otomatik seçilen öğeyi görünür alana kaydır
                selectedItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            const btn = document.getElementById('confirm-btn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function mesafeHesapla(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function konumlaVeBaslat() {
            document.getElementById('selection-modal').classList.remove('hidden');
            document.getElementById('status-text').innerText = "📍 Konumunuz doğrulanıyor...";
            renderList();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const userLat = pos.coords.latitude;
                        const userLon = pos.coords.longitude;
                        
                        let enYakinAdliye = null;
                        let minMesafe = Infinity;

                        adliyeler.forEach(a => {
                            const d = mesafeHesapla(userLat, userLon, a.lat, a.lng);
                            if (d < minMesafe) {
                                minMesafe = d;
                                enYakinAdliye = a;
                            }
                        });

                        // 2.0 km sınırı
                        if (minMesafe <= 2.0) {
                            document.getElementById('status-text').innerText = `✨ ${enYakinAdliye.ad} yakınındasınız.`;
                            renderList(enYakinAdliye.id);
                        } else {
                            document.getElementById('status-text').innerText = "Yakınlarda adliye bulunamadı. Lütfen listeden seçin.";
                        }
                    },
                    (err) => {
                        document.getElementById('status-text').innerText = "Konum izni alınamadı. Manuel seçim yapabilirsiniz.";
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        function closeModal() {
            document.getElementById('selection-modal').classList.add('hidden');
        }
    </script>
</body>
</html>
