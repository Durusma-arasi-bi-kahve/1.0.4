<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Duruşma Arası</title>
<!-- ... (tüm head ve style kısmı aynı kalıyor, kısalttım) ... -->
<style>
/* Mevcut tüm CSS'ler aynı kalıyor */
</style>
</head>
<body>

<!-- HTML içeriği aynı kalıyor (sadece script kısmı değişecek) -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// ─── FIREBASE YAPILANDIRMA ───
const firebaseConfig = { /* ... mevcut config aynı ... */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

// User ID
let userId = _get('durusma_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
_set('durusma_uid', userId);

// CHECK-IN SÜRESİ (8 saat)
const CHECKIN_DURATION = 8 * 60 * 60 * 1000; // 8 saat

// ─── STATE ───
let state = {
  checkedIn: false,
  currentAdliye: '',
  selectedMood: 'Müsaitim',
  selectedAdliye: '',
  userName: 'Av. Enes Emre',
  userSicil: '34/82741'
};

// ─── STORAGE YARDIMCILARI (mevcut fonksiyonlar aynı) ───
function saveToStorage(key, val) { /* ... mevcut ... */ }
function getFromStorage(key) { /* ... mevcut ... */ }
function removeFromStorage(key) { /* ... mevcut ... */ }

// ─── SAYFA KAYDETME ───
function saveCurrentPage(page) {
  saveToStorage('durusma_last_page', page);
}

function restoreLastPage() {
  const lastPage = getFromStorage('durusma_last_page') || 'home';
  goPage(lastPage);
  // Bottom nav'i de güncelle
  document.querySelectorAll('.nav-tab').forEach(tab => {
    if (tab.getAttribute('onclick').includes(lastPage)) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  });
}

// ─── CONFIRM CHECK-IN (EN ÖNEMLİ DEĞİŞİKLİK) ───
function confirmCheckin() {
  closeModal();
  state.checkedIn = true;
  state.currentAdliye = state.selectedAdliye;

  const checkinUntil = Date.now() + CHECKIN_DURATION;

  // UI Güncelle
  document.getElementById('big-btn').classList.add('checked-in');
  document.getElementById('big-btn-text').textContent = 'Check-in Aktif\nGüncelle';
  document.getElementById('ring1').style.cssText = 'animation:pulse-ring 2s ease-in-out infinite;opacity:0.4;';
  document.getElementById('ring2').style.cssText = 'animation:pulse-ring 2s ease-in-out 0.5s infinite;opacity:0.2;';
  document.getElementById('checkin-status').style.display = 'flex';
  document.getElementById('status-text').innerHTML = `<strong>${state.currentAdliye}</strong> · Check-in aktif`;
  document.getElementById('mood-section').style.display = 'block';
  document.getElementById('nearby-section').style.display = 'block';
  document.getElementById('pre-checkin-hint').style.display = 'none';
  document.getElementById('nearby-title').textContent = state.currentAdliye + ' — Buradakiler';

  const myName = state.userName || getFromStorage('durusma_name') || 'Avukat';
  const myInitials = document.getElementById('profile-avatar').textContent || '?';

  // Firebase'e kaydet (onDisconnect kaldırıldı!)
  const ref = db.ref('adliyeler/' + state.currentAdliye + '/' + userId);
  ref.set({
    name: myName,
    initials: myInitials,
    status: state.selectedMood,
    checkinUntil: checkinUntil,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });

  // LocalStorage'a kaydet
  saveToStorage('durusma_checkin_adliye', state.currentAdliye);
  saveToStorage('durusma_checkin_until', checkinUntil.toString());
  saveToStorage('durusma_checkin_active', '1');

  listenNearbyAvukats(state.currentAdliye);
  notifyFriendsCheckin(state.currentAdliye, myName, myInitials);
}

// ─── RESTORE CHECK-IN ───
function restoreCheckin() {
  const savedAdliye = getFromStorage('durusma_checkin_adliye');
  const savedUntil = parseInt(getFromStorage('durusma_checkin_until') || '0');
  const isActive = getFromStorage('durusma_checkin_active') === '1';

  if (!savedAdliye || !isActive || !savedUntil) return;

  // Süre dolmuş mu kontrol et
  if (Date.now() > savedUntil) {
    doCheckOut();
    return;
  }

  state.checkedIn = true;
  state.currentAdliye = savedAdliye;

  // UI Güncelle
  document.getElementById('big-btn').classList.add('checked-in');
  document.getElementById('big-btn-text').textContent = 'Check-in Aktif\nGüncelle';
  document.getElementById('ring1').style.cssText = 'animation:pulse-ring 2s ease-in-out infinite;opacity:0.4;';
  document.getElementById('ring2').style.cssText = 'animation:pulse-ring 2s ease-in-out 0.5s infinite;opacity:0.2;';
  document.getElementById('checkin-status').style.display = 'flex';
  document.getElementById('status-text').innerHTML = `<strong>${savedAdliye}</strong> · Check-in aktif`;
  document.getElementById('mood-section').style.display = 'block';
  document.getElementById('nearby-section').style.display = 'block';
  document.getElementById('pre-checkin-hint').style.display = 'none';

  const ref = db.ref('adliyeler/' + savedAdliye + '/' + userId);
  ref.update({ checkinUntil: savedUntil });

  listenNearbyAvukats(savedAdliye);
}

// ─── CHECK-OUT ───
function doCheckOut() {
  removeFromStorage('durusma_checkin_adliye');
  removeFromStorage('durusma_checkin_until');
  removeFromStorage('durusma_checkin_active');

  if (state.currentAdliye) {
    db.ref('adliyeler/' + state.currentAdliye + '/' + userId).remove();
  }

  state.checkedIn = false;
  state.currentAdliye = '';

  document.getElementById('big-btn').classList.remove('checked-in');
  document.getElementById('big-btn-text').innerHTML = 'Adliyedeyim<br>Kahveye Beklerim';
  document.getElementById('ring1').style.cssText = 'animation:none;opacity:0;';
  document.getElementById('ring2').style.cssText = 'animation:none;opacity:0;';
  document.getElementById('checkin-status').style.display = 'none';
  document.getElementById('mood-section').style.display = 'none';
  document.getElementById('nearby-section').style.display = 'none';
  document.getElementById('pre-checkin-hint').style.display = 'block';

  showToast('Adliyeden çıkış yapıldı.');
}

// ─── NEARBY VE MAP FİLTRELEME (süresi dolanları gizle) ───
function listenNearbyAvukats(adliyeName) {
  const list = document.getElementById('nearby-list');
  db.ref('adliyeler/' + adliyeName).on('value', snapshot => {
    const data = snapshot.val();
    list.innerHTML = '';
    let hasOthers = false;

    if (data) {
      Object.keys(data).forEach(key => {
        if (key === userId) return;
        const p = data[key];
        
        // Süresi dolmuş mu?
        if (p.checkinUntil && Date.now() > p.checkinUntil) {
          db.ref('adliyeler/' + adliyeName + '/' + key).remove();
          return;
        }

        hasOthers = true;
        // ... mevcut badge ve row kodları aynı ...
      });
    }
    if (!hasOthers) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">📍</span>Şu an bu adliyede<br>başka meslektaşınız görünmüyor.</div>';
    }
  });
}

// renderFriendMap fonksiyonunda da aynı checkinUntil kontrolü eklenebilir (istiyorsan söyle).

// ─── goPage Güncellemesi ───
function goPage(page, tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  
  document.getElementById('page-' + page).classList.add('active');
  if (tab) tab.classList.add('active');
  
  saveCurrentPage(page);   // ← ÖNEMLİ
}

// ─── applyLogin ───
function applyLogin(name, sicil, tel) {
  // ... mevcut kodlar ...
  document.getElementById('s-landing').classList.remove('active');
  document.getElementById('s-app').classList.add('active');
  
  loadProfilePhoto();
  listenNotifications();
  restoreCheckin();
  restoreKahveTimer();
  restoreLastPage();        // ← BURASI EKLENDİ
}

// ─── Sayfa yüklendiğinde otomatik giriş kısmı da aynı kalıyor
</script>

<!-- Geri kalan HTML aynı -->
</body>
</html>
