<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duruşma Arası">
<meta name="theme-color" content="#0F0A04">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230F0A04'/%3E%3Ctext x='90' y='115' font-size='80' text-anchor='middle'%3E%E2%98%95%3C/text%3E%3C/svg%3E">
<title>Duruşma Arası</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0A04; --bg2: #1A1208; --bg3: #231808; --card: #2A1E0A;
  --border: #3D2B0E; --border2: #5A3F18;
  --gold: #C8892A; --gold-light: #E8C97A; --gold-pale: #F5E4B0;
  --text: #F0DFB8; --muted: #9A7A50; --muted2: #6A5030;
  --green: #5AAF5A; --red: #C05050; --yellow: #D4A030; --blue: #4A90C8;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; overscroll-behavior: none; overscroll-behavior-y: contain; }
body {
  font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available; overflow-x: hidden;
  -webkit-font-smoothing: antialiased; overscroll-behavior: none; overscroll-behavior-y: contain; touch-action: pan-x pan-y;
}
.serif { font-family: 'Playfair Display', serif; }
.screen { display: none; min-height: 100vh; min-height: -webkit-fill-available; }
.screen.active { display: flex; flex-direction: column; }

/* LANDING & APP SHELL KODLARI BURADA KISALTILDI - CSS AYNI KALACAKTIR */
/* CSS kısımlarınızın aynısını buraya korudum (kod çok uzun olmaması için CSS'in genel kısımları) */
.home-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px 20px}
.checkin-status{width:100%;background:var(--bg3);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:28px;display:flex;align-items:center;gap:12px}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.off{background:var(--muted2)} .status-dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.status-text{font-size:13px;color:var(--muted);flex:1} .status-text strong{color:var(--gold-light)}
.status-exit{font-size:11px;color:var(--red);cursor:pointer;padding:4px 8px;border:0.5px solid var(--red);border-radius:6px;white-space:nowrap}
.big-btn-wrap{position:relative;margin:10px 0 32px}
.big-btn-ring{position:absolute;border-radius:50%;border:1px solid var(--gold);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;animation:none}
.big-btn-ring.r1{width:200px;height:200px} .big-btn-ring.r2{width:240px;height:240px;animation-delay:.3s}
.big-btn{width:170px;height:170px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:transform .15s,opacity .2s;position:relative;z-index:2;touch-action:manipulation;-webkit-appearance:none}
.big-btn.checked-in{background:var(--bg3);border:2px solid var(--green)}
.big-btn-icon{font-size:32px}
.big-btn-text{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--bg);text-align:center;line-height:1.4;max-width:110px}
.big-btn.checked-in .big-btn-text{color:var(--green)}
.mood-section{width:100%;margin-bottom:24px}
.section-title{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.mood-row{display:flex;gap:8px}
.mood-chip{flex:1;padding:9px 8px;border-radius:10px;border:0.5px solid var(--border);background:var(--bg3);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;text-align:center;transition:all .2s; position:relative;}
.mood-chip.selected{border-color:var(--gold);color:var(--gold-light);background:rgba(200,137,42,.08)}
.mood-icon{font-size:16px;display:block;margin-bottom:3px}
.musait-timer{font-size:11px;color:var(--green);text-align:center;margin-top:6px;font-weight:600;letter-spacing:.04em; display:none;}
/* Kalan CSS kodların aynı şekilde devam ediyor */
</style>
</head>
<body>

<div class="screen active" id="s-app">
  
  <div class="page active" id="page-home">
    <div class="home-content">
      <div class="checkin-status" id="checkin-status" style="display:none;">
        <div class="status-dot on"></div>
        <div class="status-text" id="status-text"><strong>Çağlayan Adliyesi'nde</strong> check-in yaptın.</div>
        <div class="status-exit" onclick="doCheckOut()">Çıkış Yap</div>
      </div>
      
      <div class="big-btn-wrap" id="big-btn-wrap">
        <div class="big-btn-ring r1" id="ring1"></div>
        <div class="big-btn-ring r2" id="ring2"></div>
        <button class="big-btn" id="big-btn" onclick="handleBigBtn()">
          <span class="big-btn-icon">☕</span>
          <span class="big-btn-text" id="big-btn-text">Adliyedeyim<br>Kahveye Beklerim</span>
        </button>
      </div>

      <div class="mood-section" id="mood-section" style="display:none;">
        <div class="section-title">Durumunu seç</div>
        <div class="mood-row">
          <div class="mood-chip selected" onclick="setMusaitDurum(this)">
            <span class="mood-icon">🟢</span>Müsaitim
            <div class="musait-timer" id="musait-timer">45:00</div>
          </div>
          <div class="mood-chip" onclick="setMood(this,'Duruşmada')"><span class="mood-icon">🔴</span>Duruşmada</div>
          <div class="mood-chip" onclick="setMood(this,'Kalemde')"><span class="mood-icon">🟡</span>Kalemde</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// --- YENİ 45 DAKİKA SAYICI VE LOKAL HAFIZA KODLARI ---

let musaitInterval;

function handleBigBtn() {
    // 1. Ekranda ortadaki büyük butona basıldığında check-in yap
    document.getElementById('big-btn-wrap').style.display = 'none';
    document.getElementById('checkin-status').style.display = 'flex';
    document.getElementById('mood-section').style.display = 'block';

    // Otomatik olarak Müsaitim durumunu başlat
    const musaitChip = document.querySelector('.mood-chip'); // İlk chip (Müsaitim)
    setMusaitDurum(musaitChip);
}

function doCheckOut() {
    // Çıkış yapıldığında sayacı durdur ve hafızayı temizle
    document.getElementById('big-btn-wrap').style.display = 'block';
    document.getElementById('checkin-status').style.display = 'none';
    document.getElementById('mood-section').style.display = 'none';
    
    if(musaitInterval) clearInterval(musaitInterval);
    localStorage.removeItem('musaitBitisZamani');
    document.getElementById('musait-timer').style.display = 'none';
}

function setMood(element, durum) {
    // Tüm chiplerden seçili class'ını kaldır
    document.querySelectorAll('.mood-chip').forEach(el => el.classList.remove('selected'));
    element.classList.add('selected');
    
    // Eğer "Müsaitim" harici bir şey seçilirse sayacı gizle (Dilersen iptal de edebilirsin)
    if (durum !== 'Müsaitim') {
        document.getElementById('musait-timer').style.display = 'none';
    }
}

function setMusaitDurum(element) {
    setMood(element, 'Müsaitim');
    
    const sayacElement = document.getElementById('musait-timer');
    sayacElement.style.display = 'block';

    // Eğer halihazırda devam eden bir süre yoksa 45 dakika oluştur
    if (!localStorage.getItem('musaitBitisZamani')) {
        const bitisZamani = Date.now() + (45 * 60 * 1000); // 45 dakika
        localStorage.setItem('musaitBitisZamani', bitisZamani);
    }
    
    sayaciBaslat();
}

function sayaciBaslat() {
    if(musaitInterval) clearInterval(musaitInterval);
    const sayacElement = document.getElementById('musait-timer');
    sayacElement.style.display = 'block';

    musaitInterval = setInterval(() => {
        const bitisZamani = localStorage.getItem('musaitBitisZamani');
        if (!bitisZamani) {
            clearInterval(musaitInterval);
            sayacElement.style.display = 'none';
            return;
        }

        const kalanMs = parseInt(bitisZamani) - Date.now();

        if (kalanMs <= 0) {
            // Süre Bitti
            clearInterval(musaitInterval);
            localStorage.removeItem('musaitBitisZamani');
            sayacElement.innerText = "Süre Doldu";
            // İsterseniz süre bitince otomatik çıkış yaptırabilirsiniz: doCheckOut();
        } else {
            // Dakika ve Saniye hesapla
            const dak = Math.floor((kalanMs / 1000) / 60);
            const san = Math.floor((kalanMs / 1000) % 60);
            sayacElement.innerText = `${dak}:${san.toString().padStart(2, '0')}`;
        }
    }, 1000);
}

// SAYFA YÜKLENDİĞİNDE: Hafızada sayaç varsa direkt 2. ekrana (Müsaitim) atla
window.addEventListener('load', function() {
    const bitisZamani = localStorage.getItem('musaitBitisZamani');
    
    if (bitisZamani) {
        const kalanMs = parseInt(bitisZamani) - Date.now();
        
        if (kalanMs > 0) {
            // Süre devam ediyorsa, birinci ekranı atla, doğrudan check-in yapılmış göster
            document.getElementById('big-btn-wrap').style.display = 'none';
            document.getElementById('checkin-status').style.display = 'flex';
            document.getElementById('mood-section').style.display = 'block';
            
            // Sayacı kaldığı yerden başlat
            sayaciBaslat();
        } else {
            // Süre önceden bitmişse hafızadan sil
            localStorage.removeItem('musaitBitisZamani');
        }
    }
});

/* Not: Eğer projenin geri kalan Firebase kodları vb. varsa, onları <script> etiketinin en altına veya 
kendi orijinal dosyandaki yerine dokunmadan yapıştırabilirsin. 
*/
</script>

</body>
</html>
