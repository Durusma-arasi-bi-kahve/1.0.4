<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Duruşma Arası">
<meta name="theme-color" content="#0F0A04">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230F0A04'/%3E%3Ctext x='90' y='115' font-size='80' text-anchor='middle'%3E%E2%98%95%3C/text%3E%3C/svg%3E">
<title>Duruşma Arası</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0F0A04;
    --bg2: #1A140D;
    --bg3: #261E14;
    --gold: #D4AF37;
    --gold-dim: rgba(212, 175, 55, 0.2);
    --text: #F4EFEB;
    --muted: #A3968A;
    --muted2: #7A6F66;
    --border: rgba(212, 175, 55, 0.15);
    --danger: #FF4C4C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); overflow-x: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
  .serif { font-family: 'Playfair Display', serif; }

  /* Tab Navigation */
  .tab-content { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding-bottom: 80px; }
  .tab-content.active { display: flex; }

  /* Header */
  .header { padding: 20px 16px 12px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 24px; color: var(--gold); }

  /* Profile View */
  .profile-header { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .profile-avatar-container { position: relative; margin-bottom: 16px; cursor: pointer; }
  .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: var(--bg3); }
  .profile-avatar-edit-icon { position: absolute; bottom: 0; right: 0; background: var(--gold); color: var(--bg); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid var(--bg2); }
  .profile-name { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .profile-title { font-size: 14px; color: var(--gold); margin-bottom: 8px; }
  .profile-details { display: flex; gap: 12px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .profile-stats { display: flex; gap: 20px; width: 100%; padding: 16px; background: var(--bg3); border-radius: 12px; margin-top: 10px; justify-content: center;}
  .stat-item { display: flex; flex-direction: column; align-items: center; }
  .stat-value { font-size: 18px; font-weight: 600; color: var(--gold); }
  .stat-label { font-size: 12px; color: var(--muted); }

  /* Buttons */
  .btn-primary { background: var(--gold); color: var(--bg); border: none; padding: 12px 24px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; width: 100%; margin-top: 16px;}
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 12px 24px; border-radius: 20px; font-weight: 500; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px;}

  /* Friends List */
  .friend-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .friend-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg2); border-radius: 12px; border: 0.5px solid var(--border); }
  .friend-info-group { display: flex; align-items: center; gap: 12px; }
  .friend-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--bg3); object-fit: cover; }
  .friend-name { font-size: 15px; font-weight: 500; }
  .friend-status { font-size: 12px; color: var(--muted); }
  .friend-actions { display: flex; gap: 8px; }
  .btn-icon { background: var(--bg3); border: none; color: var(--gold); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .btn-delete { color: var(--danger); background: rgba(255, 76, 76, 0.1); }

  /* Bottom Nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); z-index: 20; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); font-size: 11px; cursor: pointer; }
  .nav-item.active { color: var(--gold); }
  .nav-icon { font-size: 20px; }

  /* Chat styles (From your snippet) */
  .chat-header { display: flex; align-items: center; gap: 12px; padding: 16px; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .header-greeting { font-size: 12px; color: var(--gold); }
</style>
</head>
<body>

<div id="tab-chat" class="tab-content" style="height: 100vh;">
  <div class="chat-header">
    <button class="btn-icon" onclick="switchTab('tab-friends')" style="width:32px; height:32px;">←</button>
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:36px; height:36px; border-radius:50%; background:var(--bg3);"></div>
      <div>
        <div class="serif" id="chat-user-name" style="font-size:16px; font-weight:600;">Av. Meslektaş</div>
        <div class="header-greeting" id="chat-user-status">Çevrimiçi</div>
      </div>
    </div>
  </div>
  <div id="chat-messages" style="flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;">
    <div style="align-self:center; background:var(--bg3); padding:6px 12px; border-radius:12px; font-size:11px; color:var(--muted2);">Sohbet Başlatıldı</div>
  </div>
  <div style="padding:12px 16px; border-top:0.5px solid var(--border); display:flex; gap:10px; background:var(--bg2); padding-bottom:calc(12px + env(safe-area-inset-bottom));">
    <input type="text" id="chat-input" placeholder="Mesajınızı yazın..." style="flex:1; background:var(--bg3); border:0.5px solid var(--border); border-radius:20px; padding:10px 16px; color:var(--text); outline:none;" onkeydown="if(event.key==='Enter') sendMessage()">
    <button style="background:var(--gold); color:var(--bg); border:none; width:42px; height:42px; border-radius:50%; font-size:18px; cursor:pointer;" onclick="sendMessage()">➔</button>
  </div>
</div>

<div id="tab-friends" class="tab-content active">
  <div class="header">
    <div class="header-title serif">Arkadaşlar</div>
  </div>
  <div class="friend-list" id="friends-container">
    <div class="friend-item">
      <div class="friend-info-group">
        <img src="https://ui-avatars.com/api/?name=Ali+Y&background=261E14&color=D4AF37" class="friend-avatar" alt="Avatar">
        <div>
          <div class="friend-name">Av. Ali Yılmaz</div>
          <div class="friend-status">Çevrimiçi</div>
        </div>
      </div>
      <div class="friend-actions">
        <button class="btn-icon" onclick="switchTab('tab-chat')" title="Mesaj Gönder">💬</button>
        <button class="btn-icon btn-delete" onclick="deleteFriend(this)" title="Arkadaşı Sil">🗑️</button>
      </div>
    </div>
    <div class="friend-item">
      <div class="friend-info-group">
        <img src="https://ui-avatars.com/api/?name=Zeynep+K&background=261E14&color=D4AF37" class="friend-avatar" alt="Avatar">
        <div>
          <div class="friend-name">Stj. Av. Zeynep Kaya</div>
          <div class="friend-status">Son görülme: 2 saat önce</div>
        </div>
      </div>
      <div class="friend-actions">
        <button class="btn-icon" onclick="switchTab('tab-chat')" title="Mesaj Gönder">💬</button>
        <button class="btn-icon btn-delete" onclick="deleteFriend(this)" title="Arkadaşı Sil">🗑️</button>
      </div>
    </div>
  </div>
</div>

<div id="tab-profile" class="tab-content">
  <div class="header">
    <div class="header-title serif">Profil</div>
  </div>
  <div class="profile-header">
    
    <input type="file" id="profile-pic-input" accept="image/*" style="display: none;" onchange="handlePicUpload(event)">
    <div class="profile-avatar-container" onclick="document.getElementById('profile-pic-input').click()">
      <img src="https://ui-avatars.com/api/?name=Avukat&background=261E14&color=D4AF37" id="profile-img" class="profile-avatar" alt="Profil Fotoğrafı">
      <div class="profile-avatar-edit-icon">📷</div>
    </div>
    
    <div class="profile-name">Av. Kullanıcı Adı</div>
    <div class="profile-title">Avukat</div>
    <div class="profile-details">
      <span>📍 İstanbul Barosu</span>
      <span>•</span>
      <span>Sicil No: <span id="profile-sicil-no">Belirlenmedi</span></span>
    </div>
    
    <div class="profile-stats">
      <div class="stat-item">
        <span class="stat-value">142</span>
        <span class="stat-label">Bağlantı</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">12</span>
        <span class="stat-label">Grup</span>
      </div>
    </div>

    <button class="btn-primary" onclick="editSicilNo()">Sicil Numarasını Güncelle</button>
    <button class="btn-outline">Ayarlar</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="switchTab('tab-discover')">
    <span class="nav-icon">🌍</span>
    <span>Keşfet</span>
  </div>
  <div class="nav-item" onclick="switchTab('tab-network')">
    <span class="nav-icon">🤝</span>
    <span>Ağ</span>
  </div>
  <div class="nav-item active" onclick="switchTab('tab-friends')">
    <span class="nav-icon">👥</span>
    <span>Arkadaşlar</span>
  </div>
  <div class="nav-item" onclick="switchTab('tab-profile')">
    <span class="nav-icon">👤</span>
    <span>Profil</span>
  </div>
</div>

<script>
  // Tab Değiştirme Fonksiyonu
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
    
    const selectedTab = document.getElementById(tabId);
    if(selectedTab) selectedTab.classList.add('active');
    
    // Bottom Nav Active State
    const navItems = document.querySelectorAll('.nav-item');
    if (tabId === 'tab-friends') navItems[2].classList.add('active');
    if (tabId === 'tab-profile') navItems[3].classList.add('active');
  }

  // Profil Verilerini Yükleme
  function loadProfileData() {
    // Sicil Numarası
    const savedSicil = localStorage.getItem('userSicilNo');
    if (savedSicil) {
      document.getElementById('profile-sicil-no').innerText = savedSicil;
    }

    // Profil Fotoğrafı
    const savedPic = localStorage.getItem('userProfilePic');
    if (savedPic) {
      document.getElementById('profile-img').src = savedPic;
    }
  }

  // Sicil Numarası Düzenleme (Kayıt olunan sicil no'nun dinamik yansıması)
  function editSicilNo() {
    const currentSicil = document.getElementById('profile-sicil-no').innerText;
    const newSicil = prompt("Baro Sicil Numaranızı girin:", currentSicil !== "Belirlenmedi" ? currentSicil : "");
    
    if (newSicil && newSicil.trim() !== "") {
      localStorage.setItem('userSicilNo', newSicil.trim());
      document.getElementById('profile-sicil-no').innerText = newSicil.trim();
    }
  }

  // Profil Fotoğrafı Yükleme
  function handlePicUpload(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const dataUrl = e.target.result;
        // Fotoğrafı localStorage'a kaydet ve arayüzü güncelle
        localStorage.setItem('userProfilePic', dataUrl);
        document.getElementById('profile-img').src = dataUrl;
      };
      reader.readAsDataURL(file);
    }
  }

  // Arkadaş Silme Özelliği
  function deleteFriend(buttonElement) {
    const isConfirmed = confirm("Bu meslektaşı arkadaş listenizden çıkarmak istediğinize emin misiniz?");
    if (isConfirmed) {
      const friendItem = buttonElement.closest('.friend-item');
      if (friendItem) {
        // Animasyonlu silinme hissi için
        friendItem.style.opacity = '0';
        setTimeout(() => {
          friendItem.remove();
        }, 300);
      }
    }
  }

  // Sohbet Mesajı Gönderme (Mevcut snippet'tan)
  function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if(msg) {
      const chatBox = document.getElementById('chat-messages');
      const msgDiv = document.createElement('div');
      msgDiv.style.cssText = "align-self:flex-end; background:var(--gold); color:var(--bg); padding:10px 14px; border-radius:16px 16px 0 16px; font-size:14px; max-width:80%;";
      msgDiv.innerText = msg;
      chatBox.appendChild(msgDiv);
      input.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  }

  // Sayfa yüklendiğinde profil verilerini çek
  window.onload = function() {
    loadProfileData();
  };
</script>
</body>
</html>
