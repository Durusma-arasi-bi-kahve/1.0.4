<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duruşma Arası Bi Kahve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        body { -webkit-tap-highlight-color: transparent; background-color: #f9fafb; }
        .notification-anim { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="font-sans">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <div id="alert-popup" class="hidden fixed top-4 left-0 right-0 z-[100] px-4">
        <div class="max-w-md mx-auto bg-blue-600 text-white p-4 rounded-2xl shadow-2xl flex items-center gap-4 notification-anim">
            <div class="text-3xl">☕</div>
            <div class="flex-1">
                <p id="alert-msg" class="font-bold text-sm">Av. Selin şu an Çağlayan Adliyesi'ne giriş yaptı!</p>
            </div>
            <button onclick="closeAlert()" class="bg-blue-700 px-3 py-1 rounded-lg text-xs">Kapat</button>
        </div>
    </div>

    <div id="main-screen" class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-20">
        <header class="p-4 flex justify-between items-center border-b">
            <h1 class="text-xl font-bold text-blue-600">Duruşma Arası</h1>
            <button class="relative p-2">🔔<span class="absolute top-0 right-0 bg-red-500 w-2 h-2 rounded-full"></span></button>
        </header>

        <main class="p-6">
            <div class="bg-blue-50 p-8 rounded-3xl mb-8 text-center">
                <button onclick="konumlaVeBaslat()" class="bg-blue-600 text-white w-24 h-24 rounded-full text-4xl shadow-xl hover:scale-105 transition-transform mb-4">☕</button>
                <h2 class="text-xl font-bold">Adliyedeyim</h2>
                <p class="text-gray-600 text-sm">Kahveye Beklerim</p>
            </div>

            <div class="mt-8">
                <h3 class="font-bold mb-4 text-gray-700 flex justify-between">
                    <span>Adliyedeki Meslektaşlar</span>
                    <span id="current-court-name" class="text-blue-600 text-xs font-normal"></span>
                </h3>
                
                <div id="lawyer-list" class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center font-bold text-blue-600">AS</div>
                            <div>
                                <p class="font-bold text-sm">Av. Selin Yılmaz</p>
                                <p class="text-xs text-green-600">● Müsait</p>
                            </div>
                        </div>
                        <button onclick="mesajGonder(true, 'Av. Selin Yılmaz')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Mesaj At</button>
                    </div>

                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center font-bold text-gray-500">MK</div>
                            <div>
                                <p class="font-bold text-sm">Av. Mert Kaya</p>
                                <p class="text-xs text-gray-400">● Adliyede</p>
                            </div>
                        </div>
                        <button onclick="mesajGonder(false, 'Av. Mert Kaya')" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-xl text-xs font-bold">İstek Gönder</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="selection-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-1">Adliyeyi Onayla</h3>
            <p id="status-text" class="text-sm text-gray-500 mb-6 font-medium font-medium">Konumunuz sorgulanıyor...</p>
            <ul id="adliye-list" class="space-y-3 max-h-60 overflow-y-auto mb-6 pr-2"></ul>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">İptal</button>
                <button id="confirm-btn" onclick="checkInYap()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-bold opacity-50" disabled>Check-in Yap ✓</button>
            </div>
        </div>
    </div>

    <script>
        const adliyeler = [
            { id: 1, ad: "Çağlayan Adliyesi", lat: 41.0692, lng: 28.9803 },
            { id: 2, ad: "İstanbul Anadolu (Kartal)", lat: 40.9133, lng: 29.1760 },
            { id: 3, ad: "Bakırköy (Ana Bina)", lat: 40.9959, lng: 28.8789 },
            { id: 4, ad: "Bakırköy Ek Bina", lat: 40.9950, lng: 28.8330 },
            { id: 5, ad: "Küçükçekmece Adliyesi", lat: 41.0006, lng: 28.8101 },
            { id: 6, ad: "GOP Adliyesi", lat: 41.0682, lng: 28.9145 },
            { id: 7, ad: "İstanbul İcra (Ek Bina)", lat: 41.0682, lng: 28.9887 }
        ];

        let selectedId = null;

        // MESAJ GÖNDERME MANTIĞI
        function mesajGonder(ekliMi, isim) {
            if(ekliMi) {
                alert(isim + " ile sohbet açılıyor...");
                // window.location.href = "/chat/" + isim; (Gerçek sistemde)
            } else {
                alert(isim + " arkadaşınız değil. Mesaj isteği gönderildi!");
            }
        }

        // SESLİ VE GÖRÜNTÜLÜ UYARI SİMÜLASYONU
        function arkadasGeldiUyarisi(isim, adliyeAd) {
            document.getElementById('notif-sound').play();
            document.getElementById('alert-msg').innerText = `${isim} şu an ${adliyeAd} konumuna giriş yaptı!`;
            document.getElementById('alert-popup').classList.remove('hidden');
            
            // 5 saniye sonra otomatik kapat
            setTimeout(closeAlert, 6000);
        }

        function closeAlert() {
            document.getElementById('alert-popup').classList.add('hidden');
        }

        function checkInYap() {
            const adliye = adliyeler.find(a => a.id === selectedId);
            alert(`${adliye.ad} konumuna check-in yapıldı!`);
            document.getElementById('current-court-name').innerText = "📍 " + adliye.ad;
            closeModal();
            
            // TEST İÇİN: Check-in yaptıktan 2 saniye sonra bir arkadaşın geldiğini simüle et
            setTimeout(() => {
                arkadasGeldiUyarisi("Av. Selin Yılmaz", adliye.ad);
            }, 2000);
        }

        // --- KONUM FONKSİYONLARI (2KM KURALI DAHİL) ---
        function renderList(autoId = null) {
            const list = document.getElementById('adliye-list');
            list.innerHTML = '';
            adliyeler.forEach(a => {
                const isSelected = a.id === autoId;
                list.innerHTML += `
                    <li onclick="selectAdliye(${a.id})" id="item-${a.id}" class="p-4 border-2 rounded-2xl cursor-pointer flex justify-between items-center transition-all ${isSelected ? 'border-blue-600 bg-blue-50' : 'border-gray-100'}">
                        <span class="font-bold text-sm">${a.ad}</span>
                        ${isSelected ? '<span class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-lg">YAKIN</span>' : ''}
                    </li>`;
            });
            if(autoId) selectAdliye(autoId);
        }

        function selectAdliye(id) {
            selectedId = id;
            document.querySelectorAll('#adliye-list li').forEach(el => el.classList.remove('border-blue-600', 'bg-blue-50'));
            document.getElementById('item-'+id).classList.add('border-blue-600', 'bg-blue-50');
            const btn = document.getElementById('confirm-btn');
            btn.disabled = false; btn.classList.remove('opacity-50');
        }

        function mesafe(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function konumlaVeBaslat() {
            document.getElementById('selection-modal').classList.remove('hidden');
            renderList();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let enYakin = null; let minD = Infinity;
                    adliyeler.forEach(a => {
                        let d = mesafe(pos.coords.latitude, pos.coords.longitude, a.lat, a.lng);
                        if(d < minD) { minD = d; enYakin = a; }
                    });
                    if(minD <= 2.0) {
                        document.getElementById('status-text').innerText = "✨ Yakın adliye bulundu!";
                        renderList(enYakin.id);
                    }
                }, null, {enableHighAccuracy: true});
            }
        }

        function closeModal() { document.getElementById('selection-modal').classList.add('hidden'); }
    </script>
</body>
</html>
